<!DOCTYPE html>
<html lang="{{ current_lang }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t('login_title') }}</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
            position: relative;
            overflow: hidden;
        }

        /* Animated background */
        .bg-animation {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
            z-index: 0;
        }

        .bg-animation .circle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(139, 30, 30, 0.08), rgba(180, 60, 60, 0.06));
            animation: floatCircle 12s ease-in-out infinite;
        }

        @keyframes floatCircle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .circle-1 {
            width: 500px;
            height: 500px;
            top: -250px;
            left: -200px;
        }

        .circle-2 {
            width: 350px;
            height: 350px;
            bottom: -150px;
            right: -100px;
            animation-delay: -4s;
        }

        .circle-3 {
            width: 200px;
            height: 200px;
            top: 40%;
            right: 8%;
            animation-delay: -8s;
        }

        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 460px;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.97);
            border-radius: 28px;
            padding: 44px 40px 32px;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .login-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .login-logo {
            margin: 0 auto 20px;
        }

        .login-logo img {
            height: 80px;
            width: auto;
            object-fit: contain;
        }

        .login-header h1 {
            font-size: 22px;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 4px;
            letter-spacing: -0.3px;
        }

        .login-header .subtitle {
            color: #64748b;
            font-size: 13px;
            margin: 0;
            font-weight: 400;
        }


        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            font-weight: 600;
            font-size: 13px;
            color: #1e293b;
            margin-bottom: 6px;
        }

        .input-group-icon {
            position: relative;
        }

        .input-group-icon i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 17px;
            z-index: 10;
        }

        .input-group-icon input,
        .input-group-icon select {
            padding-left: 48px;
        }

        .form-control {
            height: 50px;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            font-size: 14px;
            transition: all 0.2s ease;
            background: #f8fafc;
        }

        .form-control:focus {
            border-color: #8b1e1e;
            box-shadow: 0 0 0 4px rgba(139, 30, 30, 0.1);
            background: #fff;
        }

        .form-control::placeholder {
            color: #94a3b8;
        }

        .btn-login {
            width: 100%;
            height: 50px;
            background: linear-gradient(135deg, #8b1e1e, #6b1515);
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            color: white;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: 0.3px;
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #6b1515, #501010);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(139, 30, 30, 0.35);
            color: white;
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .form-check {
            margin-bottom: 22px;
        }

        .form-check-label {
            font-size: 13px;
            color: #64748b;
        }

        .form-check-input:checked {
            background-color: #8b1e1e;
            border-color: #8b1e1e;
        }

        .login-footer {
            margin-top: 20px;
            text-align: center;
            padding-top: 18px;
            border-top: 1px solid #e2e8f0;
        }

        .login-footer .copyright {
            font-size: 12px;
            color: #94a3b8;
            margin: 0 0 6px 0;
        }

        .login-footer .powered-by {
            font-size: 13px;
            font-weight: 700;
            color: #475569;
            margin: 0;
            letter-spacing: 0.2px;
        }

        .alert {
            border-radius: 12px;
            border: none;
            margin-bottom: 18px;
            padding: 12px 16px;
            font-size: 13px;
        }

        .alert-danger {
            background: #fef2f2;
            color: #dc2626;
        }

        .alert-success {
            background: #f0fdf4;
            color: #16a34a;
        }

        /* Features */
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .feature-item {
            text-align: center;
            padding: 10px 6px;
            background: #f8fafc;
            border-radius: 10px;
            transition: all 0.2s;
        }

        .feature-item:hover {
            background: #f1f5f9;
        }

        .feature-item i {
            font-size: 18px;
            color: #8b1e1e;
            margin-bottom: 4px;
        }

        .feature-item span {
            display: block;
            font-size: 11px;
            color: #64748b;
            font-weight: 500;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px 24px;
                border-radius: 20px;
            }
            .login-logo img {
                height: 64px;
            }
        }
    </style>
</head>

<body>
    <!-- Background Animation -->
    <div class="bg-animation">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <img src="{{ url_for('static', filename='img/bozankaya-logo.png') }}" alt="Bozankaya">
                </div>
                <h1>SSH Takip</h1>
                <p class="subtitle">{{ t('login_subtitle') }}</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ 'danger' if category == 'error' else category }}">
                <i class="bi bi-{% if category == 'error' %}exclamation-circle{% else %}info-circle{% endif %} me-2"></i>
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" data-validate data-loading>
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label class="form-label">{{ t('select_project') }} *</label>
                    <div class="input-group-icon">
                        <i class="bi bi-folder2-open"></i>
                        <select name="project" id="projectSelect" class="form-control" required
                            onchange="validateProjectSelection(this)">
                            <option value="">-- Please Select Project --</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">{{ t('username') }}</label>
                    <div class="input-group-icon">
                        <i class="bi bi-person"></i>
                        <input type="text" name="username" class="form-control" placeholder="Enter your username"
                            required autofocus>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">{{ t('password') }}</label>
                    <div class="input-group-icon">
                        <i class="bi bi-lock"></i>
                        <input type="password" name="password" class="form-control" placeholder="Enter your password"
                            required>
                    </div>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="remember" id="remember">
                    <label class="form-check-label" for="remember">{{ t('remember_me') }}</label>
                </div>

                <button type="submit" class="btn btn-login">
                    <i class="bi bi-box-arrow-in-right"></i>
                    {{ t('login') }}
                </button>
            </form>

            <div class="features">
                <div class="feature-item">
                    <i class="bi bi-shield-check"></i>
                    <span>Secure</span>
                </div>
                <div class="feature-item">
                    <i class="bi bi-speedometer2"></i>
                    <span>Fast</span>
                </div>
                <div class="feature-item">
                    <i class="bi bi-graph-up"></i>
                    <span>Modern</span>
                </div>
            </div>

            <div class="login-footer">
                <p class="copyright">© 2026 Bozankaya A.Ş.</p>
                <p class="powered-by">Powered by Fatih Erkin</p>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function validateProjectSelection(selectElement) {
            // Proje seçim validasyonu
            if (selectElement.value === '') {
                selectElement.classList.add('is-invalid');
                selectElement.classList.remove('is-valid');
            } else {
                selectElement.classList.remove('is-invalid');
                selectElement.classList.add('is-valid');
            }
        }

        // Form submit sırasında kontrol et
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelector('form').addEventListener('submit', function (e) {
                const projectSelect = document.querySelector('select[name="project"]');
                console.log('Form submit - Project value:', projectSelect.value, 'Options:', projectSelect.options.length);
                
                if (projectSelect.value === '') {
                    // Eğer boş seçildiyse, ilk geçerli projelet seç
                    if (projectSelect.options.length > 1) {
                        projectSelect.value = projectSelect.options[1].value;
                        console.log('Empty project detected, auto-selected:', projectSelect.value);
                    } else {
                        e.preventDefault();
                        projectSelect.classList.add('is-invalid');
                        alert('Lütfen bir proje seçiniz!');
                        return false;
                    }
                }
                console.log('Final project value:', projectSelect.value);
            });
        });
        
        // Projeleri dinamik yükle
        document.addEventListener('DOMContentLoaded', function() {
            const projectSelect = document.getElementById('projectSelect');
            
            fetch('/api/projects')
                .then(response => response.json())
                .then(projects => {
                    projects.forEach(project => {
                        const option = document.createElement('option');
                        option.value = project.code;
                        option.textContent = project.name;
                        projectSelect.appendChild(option);
                    });
                })
                .catch(error => {
                    console.error('Projeler yüklenirken hata:', error);
                    // Fallback: sabit projeler
                    const fallbackProjects = [
                        {code: 'belgrad', name: 'Belgrad'},
                        {code: 'gebze', name: 'Gebze'},
                        {code: 'iasi', name: 'Iasi'},
                        {code: 'kayseri', name: 'Kayseri'},
                        {code: 'kocaeli', name: 'Kocaeli'},
                        {code: 'timisoara', name: 'Timisoara'},
                        {code: 'samsun', name: 'Samsun'},
                        {code: 'istanbul', name: 'İstanbul'},
                        {code: 'napoli', name: 'Napoli'}
                    ];
                    fallbackProjects.forEach(project => {
                        const option = document.createElement('option');
                        option.value = project.code;
                        option.textContent = project.name;
                        projectSelect.appendChild(option);
                    });
                });
        });
    </script>
</body>

</html>
