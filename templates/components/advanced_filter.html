<!-- Advanced Filtering Component -->

<div class="advanced-filter-section">
    <div class="filter-header">
        <h5 class="filter-title">
            <i class="bi bi-funnel"></i>
            Gelişmiş Filtreleme
        </h5>
        <button class="btn-reset-filters" onclick="resetAllFilters()">
            <i class="bi bi-x-circle"></i>
            Sıfırla
        </button>
    </div>

    <div class="filter-container">
        <!-- Status Filter -->
        <div class="filter-group">
            <label class="filter-label">Durum</label>
            <div class="filter-options">
                <label class="filter-checkbox">
                    <input type="checkbox" name="status" value="running" checked>
                    <span class="checkbox-label">
                        <span class="status-dot running"></span>
                        Çalışan
                    </span>
                </label>
                <label class="filter-checkbox">
                    <input type="checkbox" name="status" value="failed">
                    <span class="checkbox-label">
                        <span class="status-dot failed"></span>
                        Arızalı
                    </span>
                </label>
                <label class="filter-checkbox">
                    <input type="checkbox" name="status" value="maintenance">
                    <span class="checkbox-label">
                        <span class="status-dot maintenance"></span>
                        Bakımda
                    </span>
                </label>
                <label class="filter-checkbox">
                    <input type="checkbox" name="status" value="idle">
                    <span class="checkbox-label">
                        <span class="status-dot idle"></span>
                        Boş
                    </span>
                </label>
            </div>
        </div>

        <!-- Equipment Type Filter -->
        <div class="filter-group">
            <label class="filter-label">Ekipman Türü</label>
            <select class="filter-select" name="equipment_type" multiple>
                <option value="">-- Seç --</option>
                <option value="tramvay">Tramvay</option>
                <option value="vagon">Vagon</option>
                <option value="motor">Motor</option>
                <option value="tekerlekaksı">Tekerlekaksı</option>
                <option value="kapı">Kapı Sistemi</option>
            </select>
        </div>

        <!-- Date Range Filter -->
        <div class="filter-group">
            <label class="filter-label">Tarih Aralığı</label>
            <div class="date-range-picker">
                <input type="date" class="filter-input" name="start_date" placeholder="Başlangıç">
                <span class="date-separator">→</span>
                <input type="date" class="filter-input" name="end_date" placeholder="Bitiş">
            </div>
        </div>

        <!-- Priority Filter -->
        <div class="filter-group">
            <label class="filter-label">Öncelik</label>
            <div class="filter-options">
                <label class="filter-radio">
                    <input type="radio" name="priority" value="">
                    <span class="radio-label">Tümü</span>
                </label>
                <label class="filter-radio">
                    <input type="radio" name="priority" value="high">
                    <span class="radio-label">
                        <span class="priority-high"></span>
                        Yüksek
                    </span>
                </label>
                <label class="filter-radio">
                    <input type="radio" name="priority" value="medium">
                    <span class="radio-label">
                        <span class="priority-medium"></span>
                        Orta
                    </span>
                </label>
                <label class="filter-radio">
                    <input type="radio" name="priority" value="low">
                    <span class="radio-label">
                        <span class="priority-low"></span>
                        Düşük
                    </span>
                </label>
            </div>
        </div>

        <!-- Assigned To Filter -->
        <div class="filter-group">
            <label class="filter-label">Atanan</label>
            <select class="filter-select" name="assigned_to">
                <option value="">-- Seç --</option>
                <option value="unassigned">Atanmamış</option>
                <option value="assigned">Atanmış</option>
            </select>
        </div>

        <!-- Apply Filters Button -->
        <div class="filter-group filter-actions">
            <button class="btn btn-primary" onclick="applyFilters()">
                <i class="bi bi-sliders"></i>
                Filtreleri Uygula
            </button>
            <button class="btn btn-outline-secondary" onclick="exportFilters()">
                <i class="bi bi-download"></i>
                İndir
            </button>
        </div>
    </div>

    <!-- Active Filters Display -->
    <div class="active-filters" id="activeFilters"></div>
</div>

<style>
    .advanced-filter-section {
        background: white;
        border-radius: 16px;
        padding: 20px;
        border: 1px solid #e2e8f0;
        margin-bottom: 24px;
    }

    .filter-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 2px solid #f1f5f9;
    }

    .filter-title {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 16px;
        font-weight: 600;
        color: #1e293b;
        margin: 0;
    }

    .btn-reset-filters {
        background: none;
        border: none;
        color: #64748b;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 14px;
        padding: 6px 12px;
        border-radius: 8px;
        transition: all 0.2s;
    }

    .btn-reset-filters:hover {
        background: #f1f5f9;
        color: #ef4444;
    }

    .filter-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
    }

    .filter-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .filter-group.filter-actions {
        grid-column: 1 / -1;
        flex-direction: row;
        gap: 12px;
        margin-top: 8px;
    }

    .filter-label {
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        color: #64748b;
        letter-spacing: 0.5px;
    }

    .filter-select,
    .filter-input {
        padding: 8px 12px;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        font-size: 14px;
        transition: all 0.2s;
        font-family: inherit;
    }

    .filter-select:focus,
    .filter-input:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .date-range-picker {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .date-range-picker .filter-input {
        flex: 1;
    }

    .date-separator {
        color: #cbd5e1;
        font-weight: 600;
    }

    .filter-options {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .filter-checkbox,
    .filter-radio {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        padding: 6px 8px;
        border-radius: 6px;
        transition: all 0.2s;
    }

    .filter-checkbox:hover,
    .filter-radio:hover {
        background: #f1f5f9;
    }

    .filter-checkbox input,
    .filter-radio input {
        cursor: pointer;
        accent-color: #2563eb;
    }

    .checkbox-label,
    .radio-label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 14px;
        color: #475569;
    }

    .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
    }

    .status-dot.running {
        background: #10b981;
    }

    .status-dot.failed {
        background: #ef4444;
    }

    .status-dot.maintenance {
        background: #f59e0b;
    }

    .status-dot.idle {
        background: #64748b;
    }

    .priority-high,
    .priority-medium,
    .priority-low {
        width: 8px;
        height: 8px;
        border-radius: 2px;
        display: inline-block;
    }

    .priority-high {
        background: #ef4444;
    }

    .priority-medium {
        background: #f59e0b;
    }

    .priority-low {
        background: #10b981;
    }

    .active-filters {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 16px;
        padding-top: 12px;
        border-top: 1px solid #f1f5f9;
    }

    .filter-tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        background: #f1f5f9;
        border-radius: 20px;
        font-size: 12px;
        color: #475569;
    }

    .filter-tag-remove {
        background: none;
        border: none;
        cursor: pointer;
        color: #94a3b8;
        padding: 0;
        font-size: 14px;
        transition: color 0.2s;
    }

    .filter-tag-remove:hover {
        color: #ef4444;
    }

    /* Responsive */
    @media (max-width: 768px) {
        .filter-container {
            grid-template-columns: 1fr;
        }

        .filter-group.filter-actions {
            grid-column: 1;
            flex-direction: column;
        }

        .filter-options {
            flex-direction: row;
            flex-wrap: wrap;
        }
    }
</style>

<script>
    // Apply filters
    function applyFilters() {
        const formData = new FormData();
        
        // Collect all filter values
        document.querySelectorAll('input[type="checkbox"]:checked, input[type="radio"]:checked').forEach(el => {
            formData.append(el.name, el.value);
        });

        document.querySelectorAll('select').forEach(select => {
            if (select.value) {
                formData.append(select.name, select.value);
            }
        });

        document.querySelectorAll('input[type="date"]').forEach(input => {
            if (input.value) {
                formData.append(input.name, input.value);
            }
        });

        // Submit filters
        console.log('Filters applied:', Object.fromEntries(formData));
        updateActiveFiltersDisplay();
        // TODO: Add AJAX POST to apply filters
    }

    // Reset filters
    function resetAllFilters() {
        document.querySelectorAll('input, select').forEach(el => {
            if (el.type === 'checkbox' || el.type === 'radio') {
                el.checked = el.defaultChecked;
            } else {
                el.value = '';
            }
        });
        document.getElementById('activeFilters').innerHTML = '';
        console.log('Filters reset');
    }

    // Export filters
    function exportFilters() {
        alert('Export functionality will be implemented');
        // TODO: Add export to CSV/Excel
    }

    // Update active filters display
    function updateActiveFiltersDisplay() {
        const filters = [];
        document.querySelectorAll('input:checked, select:not([value=""])').forEach(el => {
            if (el.value) {
                filters.push(`<div class="filter-tag">${el.value}<button class="filter-tag-remove" onclick="this.parentElement.remove()">×</button></div>`);
            }
        });

        const container = document.getElementById('activeFilters');
        if (filters.length > 0) {
            container.innerHTML = '<strong style="margin-right: 12px;">Aktif Filtreler:</strong>' + filters.join('');
        } else {
            container.innerHTML = '';
        }
    }

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', updateActiveFiltersDisplay);
</script>
